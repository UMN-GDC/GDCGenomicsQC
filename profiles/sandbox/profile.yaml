executor: slurm

slurm-status-command: squeue

jobs: 8
use-singularity: true
singularity-prefix: /scratch.global/GDC/singularityimages
apptainer-prefix: /scratch.global/GDC/singularityimages
singularity-args: "--bind /scratch.global,/home,/shared"
software-deployment-method: [apptainer, env-modules]
latency-wait: 30

default-resources:
  mem_mb: 4000
  runtime: 60

cores: 7
max-threads: 7
