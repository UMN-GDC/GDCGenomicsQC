executor: slurm

slurm-status-command: squeue

jobs: 15
software-deployment-method: [env-modules, apptainer, conda]
software-deployment-prefix: /scratch.global/GDC/singularityimages
apptainer-prefix: /scratch.global/GDC/singularityimages
apptainer-args: "--bind /scratch.global,/home"
latency-wait: 60

default-resources:
  mem_mb: 4000
  runtime: 60
