# Project-wide paths
INPUT_FILE: "/projects/standard/gdc/public/r25Data/allSubjects_hg38"
OUT_DIR: "/scratch.global/coffm049/r25Pipeline"
REF: "/projects/standard/gdc/public/Ref"
vcf_template: "/projects/standard/gdc/public/r25Data/allSubjects_hg38_chr{CHR}.vcf.gz"
local-storage-prefix: "/scratch.global/coffm049/GDCGenomicsQC/workflow/.snakemake/storage"

# QC Settings
relatedness:
    method: "king"  # "0" = skip (assume unrelated), "king" = KING algorithm
    king_cutoff: 0.0884

SEX_CHECK: false
GRM: true
thin: false

# SNP Heritability Estimation
snpHerit:
    pheno: null  # Replace with your phenotype file
    # Path to covariate file(s)
    # Can be a single file path or comma-separated list for multiple files
    # e.g., "/path/to/covariates.csv" or "/path/to/cov1.csv,/path/to/cov2.csv"
    # Format: CSV with columns: IID, <covariates>
    covar: null
    out: null
    method: "AdjHE"
    npc: 10
    # Phenotype column(s) - can be column index(es) or column name(s), single value or list
    # Examples: 1, [1, 2, 3], "pheno_name", ["pheno1", "pheno2"]
    mpheno: 1
    # Covariate specification options for MASH
    fixed_effects: null  # List of covariate column names to include as fixed effects
    qcovar: null        # Quantitative covariate column names (for GCTA method)
    covar_discrete: null  # Discrete/categorical covariate column names (for GCTA method)

# Tool settings
localAncestry:
    RFMIX: false
    test: false
    thin_subjects: 0.1
    figures: "figures"

internalPCA:
    plot: true
    color_by: null
    phenotype_file: null

ancestry:
    threshold: 0.8
    model: "pca"

conda-frontend: mamba
