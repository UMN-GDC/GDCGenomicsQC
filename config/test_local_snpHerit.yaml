# Local test config for snpHerit using MASH test data
# Run from GDCGenomicsQC root with:
#   snakemake --profile profiles/local-conda --snakefile workflow/Snakefile_snpHerit_test --configfile config/test_local_snpHerit.yaml --target-jobs estimateSnpHeritability:subset=full

OUT_DIR: "./test_output/snpHerit_test"
REF: "./test_output"
chromosomes: [1]

snpHerit:
    pheno: "../MASH/tests/test_data/EUR_simulation2.pheno"
    grm_prefix: "../MASH/tests/test_data/EUR2"
    pca_input: "../MASH/tests/test_data/EUR2.2.eigenvec"
    method: "AdjHE"
    npc: 2
    mpheno: ["pheno_1", "pheno_2"]
    iid_col: "IID"
    fid_col: "FID"
    loop_covars: false
    Naive: false

plink_module: null
bcftools_module: null
shapeit_module: null
rfmix_module: null
R_module: null
samtools_module: null
crossmap_module: null
